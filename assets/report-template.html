<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<style>
  :root{
    --bg:#fbfbfb; --card:#ffffff; --ink:#212121; --muted:#717171;
    --line:#f0f0f0; --line-strong:#e4e4e4;
    --green:#48bd75; --green-deep:#02a73e; --green-soft:#b7e2c7; --green-bg:#f0faf3;
    --amber:#d48806; --amber-bg:#fff7e6; --indigo:#4f46e5; --indigo-bg:#eef2ff;
    --shadow:0 1px 2px rgba(0,0,0,.04);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);
       font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
       line-height:1.75;-webkit-font-smoothing:antialiased;font-size:15px}
  .wrap{max-width:860px;margin:0 auto;padding:40px 24px 64px}

  .hero{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--green);
        border-radius:8px;padding:24px 28px;box-shadow:var(--shadow)}
  .hero h1{font-size:22px;font-weight:700;letter-spacing:.3px}
  .hero .sub{margin-top:6px;color:var(--muted);font-size:13px}
  .hero .meta{display:flex;gap:0;margin-top:20px;border-top:1px solid var(--line);padding-top:16px}
  .hero .meta>div{flex:1;text-align:center;border-right:1px solid var(--line)}
  .hero .meta>div:last-child{border-right:none}
  .hero .meta b{display:block;font-size:20px;font-weight:700;color:var(--green-deep)}
  .hero .meta span{font-size:12px;color:var(--muted);margin-top:2px;display:block}

  section{margin-top:28px}
  section > h2{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:14px;
               display:flex;align-items:center;gap:8px}
  section > h2:before{content:"";width:3px;height:14px;background:var(--green);border-radius:2px;display:inline-block}
  .card{background:var(--card);border:1px solid var(--line);border-radius:8px;
        padding:8px 20px;box-shadow:var(--shadow)}

  /* 活动网格（GitHub 风格 24 小时热力图） */
  .grid{display:flex;gap:3px;align-items:flex-end;padding:6px 0}
  .grid .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
  .grid .cell{width:100%;height:22px;border-radius:3px;background:#f0f0f0;min-height:4px}
  .grid .cell.l1{background:#c8e8d5}.grid .cell.l2{background:#8ed3a8}
  .grid .cell.l3{background:#48bd75}.grid .cell.l4{background:#02a73e}
  .grid .hr{font-size:10px;color:var(--muted);font-variant-numeric:tabular-nums}
  .grid-legend{display:flex;align-items:center;gap:6px;justify-content:flex-end;font-size:11px;color:var(--muted);margin-top:8px}
  .grid-legend .cell{width:14px;height:14px;border-radius:3px}

  /* 三栏（亮点/重点/阻塞） */
  .three-col{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .three-col .panel{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:16px 18px;box-shadow:var(--shadow)}
  .three-col .panel h3{font-size:13px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
  .three-col .panel.hi h3{color:var(--green-deep)}
  .three-col .panel.pri h3{color:var(--indigo)}
  .three-col .panel.blk h3{color:var(--amber)}
  .three-col .panel ul{list-style:none;font-size:13px}
  .three-col .panel li{padding:5px 0;line-height:1.5}
  .three-col .panel li:before{content:"•";margin-right:6px;color:var(--muted)}
  @media(max-width:640px){.three-col{grid-template-columns:1fr}}

  /* 任务列表 */
  ul.items{list-style:none}
  ul.items li{padding:14px 0;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;gap:10px}
  ul.items li:last-child{border-bottom:none}
  .badge{display:inline-block;font-size:12px;font-weight:600;padding:3px 10px;
         border-radius:4px;flex-shrink:0;line-height:1.4}
  .badge.done{background:var(--green-bg);color:var(--green-deep)}
  .badge.doing{background:var(--amber-bg);color:var(--amber)}
  .badge.plan{background:var(--indigo-bg);color:var(--indigo)}
  ul.items li .txt{flex:1}

  /* 分类统计（周报：工作/沟通/分心占比，水平堆叠条） */
  .cat-bar{display:flex;height:28px;border-radius:6px;overflow:hidden;margin:10px 0 6px}
  .cat-bar .seg{display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:600;white-space:nowrap;overflow:hidden}
  .cat-legend{display:flex;flex-wrap:wrap;gap:14px;font-size:12px;color:var(--muted)}
  .cat-legend .dot{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:4px;vertical-align:middle}

  /* 停留时长条 */
  .dwell-row{display:grid;grid-template-columns:110px 1fr 60px;gap:14px;align-items:center;padding:8px 0}
  .dwell-row .app{font-weight:600;font-size:14px}
  .bar{background:#f5f5f5;border-radius:4px;height:8px;overflow:hidden}
  .bar > i{display:block;height:100%;background:var(--green);border-radius:4px}
  .dwell-row .dur{font-size:13px;color:var(--muted);text-align:right;font-variant-numeric:tabular-nums}

  /* 专注块（周报） */
  .focus-row{display:grid;grid-template-columns:110px 40px 1fr 60px;gap:12px;align-items:center;padding:8px 0}
  .focus-row .app{font-weight:600;font-size:14px}
  .focus-row .blk{font-size:12px;color:var(--muted);text-align:center;background:var(--green-bg);border-radius:10px;padding:2px 0;color:var(--green-deep);font-weight:600}

  /* 时间线 */
  .tl{position:relative;padding-left:18px}
  .tl:before{content:"";position:absolute;left:4px;top:8px;bottom:8px;width:2px;background:var(--line-strong)}
  .tl .ev{position:relative;padding:0 0 18px 12px}
  .tl .ev:before{content:"";position:absolute;left:-18px;top:5px;width:10px;height:10px;border-radius:50%;
                 background:var(--green);border:2px solid var(--card);box-shadow:0 0 0 2px var(--green-soft)}
  .tl .ev.idle:before{background:var(--muted);box-shadow:0 0 0 2px #eee}
  .tl .t{font-weight:600;font-size:13px;color:var(--green-deep);font-variant-numeric:tabular-nums}
  .tl .app{font-size:12px;color:var(--muted);margin-left:6px}
  .tl .what{font-size:14px;margin-top:3px;font-weight:500}
  .tl .desc{font-size:13px;color:var(--muted);margin-top:2px}

  footer{margin-top:40px;text-align:center;color:var(--muted);font-size:12px;padding-top:20px;border-top:1px solid var(--line)}
  footer code{background:var(--green-bg);padding:2px 6px;border-radius:3px;color:var(--green-deep)}
  @media print{body{background:#fff}.card,.hero,.three-col .panel{box-shadow:none}}
</style>
</head>
<body>
<div class="wrap">

  <div class="hero">
    <h1>{{TITLE}}</h1>
    <div class="sub">{{SUBTITLE}}</div>
    <div class="meta">
      <div><b>{{META1_VAL}}</b><span>{{META1_LABEL}}</span></div>
      <div><b>{{META2_VAL}}</b><span>{{META2_LABEL}}</span></div>
      <div><b>{{META3_VAL}}</b><span>{{META3_LABEL}}</span></div>
    </div>
  </div>

  <!-- 渲染规则见同目录 render-guide.md。最终 HTML 里不得残留 {{...}} 占位符、SLOT 标记或本注释。 -->

  <!-- SLOT: activity-grid -->
  <!-- daily 用：24 小时活动热力图。每格 .cell.l0~l4，数据来自 aggregate --json 的 activity_grid -->
  <!-- /SLOT: activity-grid -->

  <!-- SLOT: standup -->
  <!-- daily 用：三栏 = 昨日亮点(highlights) / 今日重点(priorities) / 阻塞(blockers) -->
  <!-- /SLOT: standup -->

  <!-- SLOT: overview -->
  <!-- monthly 用：本月概览 2-4 句 -->
  <!-- /SLOT: overview -->

  <!-- SLOT: items -->
  <section>
    <h2>{{ITEMS_TITLE}}</h2>
    <div class="card">
      <ul class="items">
        <!-- <li><span class="badge done">完成</span><span class="txt">事项文本</span></li> -->
      </ul>
    </div>
  </section>
  <!-- /SLOT: items -->

  <!-- SLOT: focus -->
  <!-- weekly 用：专注模式分类。每条 .focus-row（app / 专注块数 / 时长条 / 总时长） -->
  <!-- /SLOT: focus -->

  <!-- SLOT: categories -->
  <!-- weekly 用：分类占比（工作/沟通/分心/个人/空闲）。水平堆叠条 .cat-bar + 图例 -->
  <!-- /SLOT: categories -->

  <!-- SLOT: dwell -->
  <section>
    <h2>{{DWELL_TITLE}}</h2>
    <div class="card">
      <!-- <div class="dwell-row"><div class="app">Code</div><div class="bar"><i style="width:100%"></i></div><div class="dur">1h00m</div></div> -->
    </div>
  </section>
  <!-- /SLOT: dwell -->

  <!-- SLOT: timeline -->
  <section>
    <h2>{{TIMELINE_TITLE}}</h2>
    <div class="card">
      <div class="tl">
        <!-- <div class="ev"><span class="t">09:00</span><span class="app">Code</span><div class="what">main.ts</div><div class="desc">描述</div></div> -->
      </div>
    </div>
  </section>
  <!-- /SLOT: timeline -->

  <footer>
    由 <code>AI日报助手</code> 生成 · 数据仅存本地 · 截图分析后即删
  </footer>
</div>
</body>
</html>
